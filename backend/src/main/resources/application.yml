server:
  port: ${PORT:8080}

spring:
  application:
    name: taxflow
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/taxflow}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:2004}
    hikari:
      maximum-pool-size: 12
      minimum-idle: 2
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: false
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
  servlet:
    multipart:
      max-file-size: 15MB
      max-request-size: 25MB

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

app:
  jwt:
    secret: ${JWT_SECRET:TaxFlowDefaultJwtSecretForLocalDevelopmentOnlyChangeInProduction2026}
    access-token-minutes: ${JWT_ACCESS_MINUTES:30}
    refresh-token-days: ${JWT_REFRESH_DAYS:14}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}
  rate-limit:
    requests-per-minute: ${RATE_LIMIT_PER_MINUTE:160}
  storage:
    path: ${STORAGE_PATH:./storage}

logging:
  level:
    com.taxflow: INFO
    org.springframework.security: WARN
